syntax = "proto3";

package homecctv.v1;

option cc_generic_services = false;

service CameraService {
    rpc RegisterCamera(RegisterCameraRequest) returns (RegisterCameraResponse);
    rpc GetCamera(GetCameraRequest) returns (GetCameraResponse);
    rpc ListCameras(ListCamerasRequest) returns (ListCamerasResponse);
    rpc UpdateCamera(UpdateCameraRequest) returns (UpdateCameraResponse);
    rpc DeleteCamera(DeleteCameraRequest) returns (DeleteCameraResponse);
}

enum CameraStatus {
    CAMERA_STATUS_UNSPECIFIED = 0;
    CAMERA_STATUS_INACTIVE = 1;
    CAMERA_STATUS_ACTIVE = 2;
    CAMERA_STATUS_ERROR = 3;
}

enum RtspTransport {
    RTSP_TRANSPORT_UNSPECIFIED = 0;
    RTSP_TRANSPORT_TCP = 1;
    RTSP_TRANSPORT_UDP = 2;
}

message CameraSettings {
    RtspTransport transport = 1;
    int32 segment_duration_sec = 2;
    int32 hls_list_size = 3;
    bool recording_enabled = 4;
    string recording_path = 5;
}

message Camera {
    string id = 1;
    string name = 2;
    string rtsp_url = 3;
    CameraStatus status = 4;
    CameraSettings settings = 5;
    int64 created_at = 6;
    int64 updated_at = 7;
    string last_error = 8;
}

message RegisterCameraRequest {
    string name = 1;
    string rtsp_url = 2;
    CameraSettings settings = 3;
}

message RegisterCameraResponse {
    Camera camera = 1;
}

message GetCameraRequest {
    string id = 1;
}

message GetCameraResponse {
    Camera camera = 1;
}

message ListCamerasRequest {}

message ListCamerasResponse {
    repeated Camera cameras = 1;
}

message UpdateCameraRequest {
    string id = 1;
    string name = 2;
    string rtsp_url = 3;
    CameraSettings settings = 4;
}

message UpdateCameraResponse {
    Camera camera = 1;
}

message DeleteCameraRequest {
    string id = 1;
}

message DeleteCameraResponse {
    bool success = 1;
}
